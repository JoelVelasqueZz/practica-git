<!DOCTYPE html>
  <html lang="es">
  <head>
    <meta charset="UTF-8">
    <title>Mis Viajes</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: Arial, sans-serif; background: #f0f4f8; padding: 20px; }
      h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; font-size: 36px; }
      .destinos {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        max-width: 900px;
        margin: 0 auto;
      }
      .destino {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        transition: transform 0.2s;
      }
      .destino:hover { transform: translateY(-4px); }
      .destino-img {
        width: 100%;
        height: 160px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 60px;
        background: #f8f9fa;
      }
      .destino-info { padding: 16px; }
      .destino-info h2 { color: #2c3e50; margin-bottom: 8px; }
      .destino-info p { color: #666; font-size: 14px; line-height: 1.5; }
      .tag {
        display: inline-block;
        background: #3498db;
        color: white;
        padding: 3px 10px;
        border-radius: 12px;
        font-size: 12px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h1>🌍 Mis Viajes</h1>
    <div class="destinos">
      <div class="destino">
        <div class="destino-img">🗼</div>
        <div class="destino-info">
          <h2>París</h2>
          <p>La ciudad del amor. Torre Eiffel y los mejores croissants.</p>
          <span class="tag">Europa</span>
        </div>
      </div>
      <div class="destino">
        <div class="destino-img">⛩️</div>
        <div class="destino-info">
          <h2>Tokyo</h2>
          <p>Tecnología y tradición. Sushi, anime y templos milenarios.</p>
          <span class="tag">Asia</span>
        </div>
      </div>
      <div class="destino">
        <div class="destino-img">🗽</div>
        <div class="destino-info">
          <h2>Nueva York</h2>
          <p>La ciudad que nunca duerme. Times Square y Central Park.</p>
          <span class="tag">América</span>
        </div>
      </div>
    </div>
  </body>
  </html>
