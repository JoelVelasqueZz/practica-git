<!DOCTYPE html>
<html>
  <head>
    <title>Mi proyecto</title>
  </head>
  <body>
    <h1>Hola Git</h1>
    <p>Estoy aprendiendo control de versiones</p>

    <section>
      <h2>Sección nueva</h2>
      <p>Esta sección se agregó desde la rama nueva-seccion</p>
    </section>

    <style>
      body {
        background: purple;
      }
    </style>

   <section id="contacto" style="
    max-width: 500px;
    margin: 40px auto;
    padding: 30px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  ">
    <h2 style="margin-bottom: 20px; color: #2c3e50;">Contacto</h2>

    <div style="margin-bottom: 16px;">
      <label style="display: block; margin-bottom: 6px; color: #666;">Nombre</label>
      <input type="text" placeholder="Tu nombre"
        style="width: 100%; padding: 10px; border: 2px solid #ddd;
        border-radius: 8px; font-size: 15px;">
    </div>

    <div style="margin-bottom: 16px;">
      <label style="display: block; margin-bottom: 6px; color: #666;">Email</label>
      <input type="email" placeholder="tu@email.com"
        style="width: 100%; padding: 10px; border: 2px solid #ddd;
        border-radius: 8px; font-size: 15px;">
    </div>

    <div style="margin-bottom: 20px;">
      <label style="display: block; margin-bottom: 6px; color: #666;">Mensaje</label>
      <textarea placeholder="Escribe tu mensaje..."
        style="width: 100%; padding: 10px; border: 2px solid #ddd;
        border-radius: 8px; font-size: 15px; height: 100px; resize: none;">
      </textarea>
    </div>

    <button style="
      width: 100%;
      padding: 12px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    ">Enviar mensaje</button>
  </section>

  </body>
</html>
